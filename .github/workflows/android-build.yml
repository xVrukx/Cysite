name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Qt Android Environment
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.13'
          target: 'android'
          arch: 'android_arm64_v8a'

      - name: Generate Android Deployment Project
        run: |
          echo "TEMPLATE = app" > Cysite.pro
          echo "TARGET = neon_notes" >> Cysite.pro
          echo "QT += widgets" >> Cysite.pro
          echo "SOURCES += main.cpp" >> Cysite.pro
          
          # Run QMake to generate the specialized mobile build folders
          qmake Cysite.pro -spec android-clang

      - name: compiling and building installable apk
        run: |
          # Build the C++ Shared Library
          make -j$(nproc)
          
          # package raw background folders into a standard debug .apk package
          make apk

      - name: Upload Output Installable APK
        uses: actions/upload-artifact@v4
        with:
          name: neon-notes-installable-apk
          path: ./**/*.apk
