name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & NDK Default
        uses: android-actions/setup-android@v3

      - name: Install Stable Android NDK r25c
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.4.7075529"
          
          # FIX: Securely inject variables permanently across ALL steps using GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Install Qt Android Environment
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          target: 'android'
          arch: 'android'

      - name: Generate Android Deployment Project
        run: |
          echo "TEMPLATE = app" > Cysite.pro
          echo "TARGET = Cysite" >> Cysite.pro
          echo "QT += widgets" >> Cysite.pro
          echo "SOURCES += main.cpp" >> Cysite.pro  
         
          # Generate localized Makefiles using the persistent NDK path
          qmake Cysite.pro -spec android-clang ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT

      - name: Compiling and Building Installable APK
        run: |
          # Build the underlying C++ backend binary libraries
          make -j$(nproc)
          
          # FIX: Direct the deployment script to pack the platform plugin correctly
          make apk ANDROID_DEPLOYMENT_SETTINGS=android-Cysite-deployment-settings.json
          
      - name: Upload Output Installable APK
        uses: actions/upload-artifact@v4
        with:
          name: Cysite-installable-apk
          path: ./**/*.apk
